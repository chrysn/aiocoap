when:
  - event: push
  # While we're still on the GitHub issue tracker, the pull_request event stays off, and we evaluate every single branch.
  #   branch: [main, woodpecker]
  # - event: pull_request


# Generally, our test and tox running matrix is:
#
# * We have a -noextras variant and an -allextras variant, and run them both,
#   so if something breaks when optional dependencies are missing, it still shows up.
#
#   (Full coverage would mean running each combination, but let's not blow the
#   test matrix out of proportion).
#
# * We always run a --notest pass first as to not waste time telling errors in
#   setup apart from errors at runtime
#
# * For some Python versions, we run different main loops and/or transports.
#   (Again, full coverage against all versions is probably excessive.)
#
# --skip-env is often used to mask out Python versions that are installed on
# the system but are not what we want to test here (for example, the Python
# 3.13 image is based on a Debian that ships its own older Python).
#
# Generally, all can run in parallel; setting depends_on to one hero test so
# that we don't waste resources if one already fails.

steps:
  env:
    # small enough, widespread, and has busybox iproute
    image: docker.io/bash
    commands:
      - echo export FORCE_COLOR=1 > envvars
      # Using IPv4 while Codeberg's woodpecker has no IPv6 route, but
      # generally, the IPv6 default interface is usually also the IPv4 default
      # inteface.
      - echo export AIOCOAP_TEST_MCIF=`ip route list |grep default |sed -e 's/^.* dev //' -e 's/ .*$//'` >> envvars
      - cat envvars

  test:tox-bookworm:
    image: debian:bookworm
    depends_on: [env, test:3.13-minimal]
    commands:
      - . ./envvars
      - apt-get update
      - apt-get -y install build-essential python3.11-dev libssl-dev autoconf python3-pip python3-venv libffi-dev libgirepository1.0-dev libcairo2-dev
      # "Externally managed", so we have to go through a venv
      - python3 -m venv .venv
      - . .venv/bin/activate
      # Both are available, but are quite old and woudl not forward
      # __TOX_ENVIRONMENT_VARIABLE_ORIGINAL_CI (tox since 4.30.0) or would fail
      # to build (setuptools).
      - pip install tox setuptools
      - tox --notest
      - tox

  test:pypy:
    # Workaround-For: https://github.com/pypy/pypy/issues/5388
    image: docker.io/pypy:3-7.3.20
    depends_on: [env, test:3.13-minimal]
    commands:
      - . ./envvars
      - pip install tox
      - tox --notest --skip-env '^py[^p]'
      - tox --skip-env '^py[^p]'

  test:py312-pyloop:
    image: docker.io/python:3.12
    depends_on: [env, test:3.13-minimal]
    commands:
      - . ./envvars
      - pip install tox
      - tox --notest -e py312-noextras -e py312-allextras
      - tox -e py312-noextras -e py312-allextras

  test:py312-otherloop:
    image: docker.io/python:3.12
    depends_on: [env, test:3.13-minimal]
    commands:
      - . ./envvars
      - apt-get update
      # required for building pygobject
      - apt-get -y install cmake libgirepository1.0-dev
      - pip install tox
      - tox --notest -e py312-uvloop-simpleudp -e py312-uvloop -e py312-glib
      - tox -e py312-uvloop-simpleudp -e py312-uvloop -e py312-glib


  test:3.13-minimal:
    image: docker.io/python:3.13
    depends_on: [env]
    environment:
      # This is the fastest we can run at all, and serves as our "hero test"
      TOXENV: "py313-noextras"
    commands:
      - . ./envvars
      - pip install tox
      - tox --notest
      - tox

  test:3.13:
    image: docker.io/python:3.13
    depends_on: [env, test:3.13-minimal]
    commands:
      - . ./envvars
      - pip install tox
      - tox --notest --skip-env '^py31[^3]'
      - tox --skip-env '^py31[^3]|py313-noextras'

  test:3.14:
    image: docker.io/python:3.14
    depends_on: [env, test:3.13-minimal]
    commands:
      - . ./envvars
      - pip install tox
      - tox --notest --skip-env '^py31[^4]'
      - tox --skip-env '^py31[^4]'

  mypy:
    image: docker.io/python:3.12
    depends_on: [env]
    commands:
      - . ./envvars
      - pip install mypy
      - pip install '.[all]'
      - mypy --install-types --non-interactive aiocoap

  ruff:
    image: python:3
    depends_on: [env]
    commands:
      - . ./envvars
      - pip install ruff
      - ruff format --check
      # Excluding the client scripts as their heavy reliance on `from aiocoap
      # import *` would decrease their usefullness as easy quick-start script
      - ruff check aiocoap

  reuse:
    image: python:3
    depends_on: [env]
    commands:
      - . ./envvars
      - pip install reuse
      - reuse lint

  doc:
    image: python:3.13
    # build-wheel: Not because there's a hard dependency, but because those two appear to
    # occasionally race for creating that wheel. The tox instances all work in
    # their isolation, but it'd need extra work to tell sphinx or build to not
    # use a shared dist/.
    depends_on: [env, build-wheel]
    commands:
      - . ./envvars
      # synced with .readthedocs.yaml and pyproject.toml
      - pip install '.[docs,oscore,prettyprint,slipmux]'
      - python3 -m sphinx doc public/doc/
      - python3 -m docutils README.rst --strict > /dev/null
      # codeberg pages redirects from ./index.html to ./ and drops query
      # paramters. That's not wrong (wouldn't even blame them for not serving
      # with unknown params), but mismatches what Jupyter is expecting.
      - "find public/doc -name '*.html' -exec sed 's@lite/lab/index.html.path=@lite/lab/?path=@' -i '{}' '+'"

  build-wheel:
    image: python:3.13
    depends_on: [env]
    commands:
      - . ./envvars
      - pip install build
      - python3 -m build
      - mkdir -p public
      - cp -r dist/ public/

  build-pages:
    image: docker.io/python:3
    depends_on:
      - env
      - test:tox-bookworm
      - test:py312-pyloop
      - test:py312-otherloop
      - test:3.13-minimal
      - test:3.13
      - test:3.14
      - test:pypy
      - doc
      - build-wheel
    commands:
      - . ./envvars
      - python3 -m pip install tox coverage genbadge[all]
      - "# Test whether all described tox environments have succeeded"
      - "# (equivalently: started, for on failure, this step would not be run)"
      - "# at least once."
      - tox list --no-desc | sed 's@^@.coverage/success-env-@' | xargs ls
      - ./.woodpecker/build-pages.sh

  publish-pages:
    image: codeberg.org/xfix/plugin-codeberg-pages-deploy:1
    depends_on:
      - build-pages
    settings:
      folder: public
      ssh_key:
        from_secret: ssh_key
    when:
      - event: push
        # add your branch name here temporarily if you want to see the output
        # deployed even before it hits main
        branch: main
